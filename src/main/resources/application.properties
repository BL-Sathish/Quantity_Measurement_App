# Database Configuration
db.driver=org.h2.Driver
db.url=jdbc:h2:mem:quantity_db;DB_CLOSE_DELAY=-1;MODE=MySQL
db.user=sa
db.password=

# Connection Pool Configuration
db.pool.initialSize=5
db.pool.maxSize=10

# Repository Type (cache or database)
repository.type=database

# Logging levels
logging.level.com.app.quantitymeasurement=INFO
